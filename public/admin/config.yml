backend:
  name: github
  repo: aixiatw/website
  branch: main
  base_url: https://dr-wu.cc
  auth_endpoint: api/auth

site_url: https://dr-wu.cc
display_url: https://dr-wu.cc

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "頁面設定"
    files:
      - name: "homepage"
        label: "首頁"
        file: "src/data/homepage.json"
        fields:
          - label: "Hero 區塊"
            name: "hero"
            widget: "object"
            fields:
              - { label: "標題標籤", name: "badge", widget: "string" }
              - { label: "醫師姓名", name: "name", widget: "string" }
              - { label: "副標題", name: "subtitle", widget: "string" }
              - { label: "介紹文字", name: "description", widget: "text" }
              - { label: "經歷年數", name: "experience_years", widget: "string" }
              - { label: "經歷標籤", name: "experience_label", widget: "string" }
              - { label: "經歷副標籤", name: "experience_sublabel", widget: "string" }
          - label: "專業服務"
            name: "expertise"
            widget: "object"
            fields:
              - { label: "標題", name: "title", widget: "string" }
              - { label: "副標題", name: "subtitle", widget: "string" }
              - label: "服務項目"
                name: "services"
                widget: "list"
                fields:
                  - { label: "名稱", name: "title", widget: "string" }
                  - { label: "說明", name: "description", widget: "text" }
          - label: "行動呼籲"
            name: "cta"
            widget: "object"
            fields:
              - { label: "標題", name: "title", widget: "string" }
              - { label: "說明", name: "description", widget: "string" }
              - { label: "按鈕文字", name: "button_text", widget: "string" }
              - { label: "按鈕連結", name: "button_url", widget: "string" }

      - name: "about"
        label: "關於醫師"
        file: "src/data/about.json"
        fields:
          - label: "Hero 區塊"
            name: "hero"
            widget: "object"
            fields:
              - { label: "標題標籤", name: "badge", widget: "string" }
              - { label: "醫師姓名", name: "name", widget: "string" }
              - { label: "職稱", name: "position", widget: "string" }
              - { label: "介紹文字", name: "description", widget: "text" }
              - label: "專業證照"
                name: "certifications"
                widget: "list"
                field: { label: "證照", name: "item", widget: "string" }
          - label: "現任"
            name: "current"
            widget: "list"
            field: { label: "職務", name: "item", widget: "string" }
          - label: "學歷"
            name: "education"
            widget: "list"
            field: { label: "學歷", name: "item", widget: "string" }
          - label: "經歷"
            name: "experience"
            widget: "list"
            field: { label: "經歷", name: "item", widget: "string" }
          - label: "專長"
            name: "specialties"
            widget: "list"
            field: { label: "專長", name: "item", widget: "string" }

      - name: "contact"
        label: "聯絡方式"
        file: "src/data/contact.json"
        fields:
          - label: "門診掛號"
            name: "appointment"
            widget: "object"
            fields:
              - { label: "說明文字", name: "description", widget: "text" }
              - { label: "按鈕文字", name: "button_text", widget: "string" }
              - { label: "按鈕連結", name: "button_url", widget: "string" }
          - label: "醫院資訊"
            name: "hospital"
            widget: "object"
            fields:
              - { label: "醫院名稱", name: "name", widget: "string" }
              - { label: "地址", name: "address", widget: "string" }
              - { label: "電話", name: "phone", widget: "string" }
              - { label: "備註", name: "note", widget: "string" }
          - label: "交通指引"
            name: "transportation"
            widget: "object"
            fields:
              - { label: "路線說明", name: "north_route", widget: "text" }
              - { label: "大眾運輸", name: "public_transport", widget: "text" }

  - name: "blog"
    label: "衛教文章"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "發布日期", name: "date", widget: "datetime" }
      - { label: "作者", name: "author", widget: "string", default: "吳文綺醫師" }
      - { label: "分類", name: "category", widget: "string" }
      - { label: "內容", name: "body", widget: "markdown" }
      - { label: "封面", name: "image", widget: "image", required: false }
      - { label: "摘要", name: "description", widget: "string", required: false }
      - label: "草稿"
        name: "draft"
        widget: "boolean"
        default: false
