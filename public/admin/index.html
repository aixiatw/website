<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>後台管理 - 吳文綺醫師</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FFFAF5; }

    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-card h1 {
      font-size: 1.5rem;
      color: #4A3728;
      margin-bottom: 8px;
      text-align: center;
    }
    .login-card p.subtitle {
      color: #8B6F5C;
      text-align: center;
      margin-bottom: 28px;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      color: #4A3728;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #E8D5C4;
      border-radius: 8px;
      font-size: 1rem;
      color: #4A3728;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #D4856A; }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #D4856A;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #c06f54; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      color: #e53e3e;
      font-size: 0.875rem;
      margin-top: 12px;
      text-align: center;
      display: none;
    }

    #loading-screen {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: #FFFAF5;
    }
    #loading-screen p {
      color: #8B6F5C;
      font-size: 1rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #E8D5C4;
      border-top-color: #D4856A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #nc-root { min-height: 100vh; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>後台管理</h1>
    <p class="subtitle">吳文綺醫師官網 Content Manager</p>
    <form id="login-form">
      <div class="form-group">
        <label for="username">帳號（Email）</label>
        <input type="email" id="username" placeholder="your@email.com" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">密碼</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="login-btn" id="login-btn">登入</button>
      <p class="error-msg" id="error-msg"></p>
    </form>
  </div>
</div>

<div id="loading-screen">
  <div class="spinner"></div>
  <p>正在載入後台，請稍候…</p>
</div>

<div id="nc-root"></div>

<script>
  var _githubToken = null;

  // Listen for OAuth postMessage from our /api/auth popup
  window.addEventListener('message', function(e) {
    if (e.origin === 'https://dr-wu.cc') {
      var d = e.data || '';
      if (d.indexOf('authorization:github:success:') === 0) {
        // CMS will handle this itself; also store for safety
        try {
          var info = JSON.parse(d.replace('authorization:github:success:', ''));
          localStorage.setItem('decap-cms-user', JSON.stringify({
            token: info.token,
            backendName: 'github'
          }));
        } catch(ex) {}
      }
    }
  });

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = document.getElementById('login-btn');
    var errEl = document.getElementById('error-msg');
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = '登入中…';
    errEl.style.display = 'none';

    try {
      var res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      });
      var data = await res.json();

      if (data.ok) {
        _githubToken = data.githubToken;
        loadCMS();
      } else {
        errEl.textContent = data.error || '帳號或密碼錯誤';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登入';
      }
    } catch (err) {
      errEl.textContent = '網路錯誤，請稍後再試';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '登入';
    }
  });

  function loadCMS() {
    // Hide login, show loading
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('loading-screen').style.display = 'flex';

    // Pre-populate localStorage so CMS auto-logs in
    if (_githubToken) {
      localStorage.setItem('decap-cms-user', JSON.stringify({
        token: _githubToken,
        backendName: 'github'
      }));
    }

    // Load Decap CMS
    var script = document.createElement('script');
    script.src = '/admin/decap-cms.js';
    script.onload = function() {
      // CMS is loaded - hide loading screen
      document.getElementById('loading-screen').style.display = 'none';

      // If CMS still shows login button after 2 seconds, auto-click it
      // (fallback if localStorage token was rejected)
      setTimeout(autoClickLoginIfNeeded, 2000);
    };
    document.body.appendChild(script);
  }

  function autoClickLoginIfNeeded() {
    // Check if CMS is showing its own login page
    var nc = document.getElementById('nc-root');
    if (!nc) return;

    // Look for any button containing "GitHub" text
    var btns = nc.querySelectorAll('button');
    for (var i = 0; i < btns.length; i++) {
      if (btns[i].textContent.indexOf('GitHub') >= 0 ||
          btns[i].textContent.indexOf('github') >= 0) {
        btns[i].click();
        return;
      }
    }

    // Also try links with GitHub
    var links = nc.querySelectorAll('a');
    for (var j = 0; j < links.length; j++) {
      if (links[j].textContent.indexOf('GitHub') >= 0) {
        links[j].click();
        return;
      }
    }

    // CMS might still be loading, retry once more
    setTimeout(autoClickLoginIfNeeded, 2000);
  }
</script>

</body>
</html>
